<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>BOAT RACE AI</title>
<meta name="theme-color" content="#0b1220">
<style>
:root{--line:#243a63;--text:#edf4ff;--muted:#9fb3d9}
*{box-sizing:border-box}
body{margin:0;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top left,#16335f 0%,#08101c 42%),linear-gradient(180deg,#08101c,#091221)}
.app{max-width:430px;margin:0 auto;min-height:100vh;padding:0 0 28px}
.header{padding:20px 14px 24px;background:linear-gradient(135deg,#0f172a,#1d4ed8 58%,#06b6d4);border-bottom-left-radius:24px;border-bottom-right-radius:24px;box-shadow:0 12px 26px rgba(0,0,0,.35)}
.header h1{margin:0;font-size:24px}.header p{margin:6px 0 0;font-size:12px;opacity:.95}
.card{margin:12px;padding:16px;border-radius:20px;background:linear-gradient(180deg,rgba(18,29,52,.98),rgba(11,20,36,.98));border:1px solid var(--line);box-shadow:0 10px 24px rgba(0,0,0,.26)}
.hero{border-radius:22px;padding:20px;text-align:center;background:linear-gradient(135deg,#0b1220,#1e3a8a 58%,#0891b2);border:1px solid #345bab}
.hero .big{font-size:32px;font-weight:900;line-height:1.2}.hero .sub{font-size:13px;opacity:.95;margin-top:8px}
.btn{display:block;width:100%;text-decoration:none;color:white;font-weight:900;text-align:center;padding:16px 14px;border-radius:18px;margin-top:10px}
.btn-lite{background:linear-gradient(135deg,#2563eb,#06b6d4)}.btn-pro{background:linear-gradient(135deg,#7c3aed,#2563eb)}
.badge{display:inline-block;padding:7px 11px;border-radius:999px;margin:4px;font-weight:800}
.good{background:linear-gradient(135deg,#059669,#16a34a)}.gold{background:linear-gradient(135deg,#f59e0b,#facc15);color:#111827}
.small{font-size:12px;color:var(--muted);line-height:1.7}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>BOAT RACE AI</h1>
    <p>LITE と PRO MAX を使い分けるトップページ</p>
  </div>
  <div class="card">
    <div class="hero">
      <div class="big">普段は LITE<br>勝負は PRO MAX</div>
      <div class="sub">入力の軽さと精度重視をワンタップで切り替え</div>
    </div>
  </div>
  <div class="card">
    <span class="badge good">普段用</span>
    <a class="btn btn-lite" href="lite.html">BOAT RACE AI LITE を開く</a>
    <div class="small">展示 / ST / M2 / 全国 の4項目だけ。最速で回したい時向け。</div>
  </div>
  <div class="card">
    <span class="badge gold">勝負用</span>
    <a class="btn btn-pro" href="pro.html">BOAT RACE AI PRO MAX を開く</a>
    <div class="small">進入予測AI / 1マーク展開AI / 展示差AI / 信頼度メーターつき。</div>
  </div>
</div>
</body>
</html>
