
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BOAT RACE AI PRO MAX 最終版</title>
<style>
body{margin:0;background:#0b1220;color:#fff;font-family:-apple-system}
.app{max-width:430px;margin:auto;padding:10px}
.card{background:#111827;padding:14px;margin:10px 0;border-radius:16px}
input,select,button{width:100%;padding:10px;margin-top:6px;border-radius:10px;border:none}
input,select{background:#020617;color:#fff}
button{background:linear-gradient(135deg,#2563eb,#06b6d4);color:#fff;font-weight:800}
.grid{display:grid;grid-template-columns:40px repeat(5,1fr);gap:6px;margin-top:6px}
.cap{display:flex;align-items:center;justify-content:center;font-weight:900;height:40px;border-radius:8px}
.c1{background:#fff;color:#000}.c2{background:#000}.c3{background:#ef4444}.c4{background:#2563eb}.c5{background:#f59e0b;color:#000}.c6{background:#16a34a}
.badge{display:inline-block;padding:6px 10px;border-radius:999px;margin:4px;font-weight:800}
.good{background:#16a34a}.warn{background:#dc2626}.tip{background:#2563eb}.gold{background:#f59e0b;color:#111}
.comment{background:#0f172a;padding:10px;border-radius:12px;margin-top:8px}
</style>
</head>
<body>
<div class="app">

<div class="card">
<select id="track">
<option>常滑</option><option>大村</option><option>住之江</option>
</select>
<input id="budget" placeholder="予算">
</div>

<div class="card">
<div id="inputs"></div>
</div>

<div class="card">
<button onclick="runAI()">AI予想</button>
</div>

<div class="card">
<div id="result"></div>
</div>

</div>

<script>

function makeInputs(){
let html="";
for(let i=1;i<=6;i++){
html+=`
<div class="grid">
<div class="cap c${i}">${i}</div>
<input id="rate${i}">
<input id="m2${i}">
<input id="st${i}">
<input id="tenji${i}">
<select id="cls${i}">
<option>A1</option><option>A2</option><option>B1</option><option>B2</option>
</select>
</div>`;
}
document.getElementById("inputs").innerHTML=html;
}

function runAI(){

let arr=[];
for(let i=1;i<=6;i++){
let rate=+rate+i||0;
let m2=+document.getElementById("m2"+i).value||0;
let st=+document.getElementById("st"+i).value||0;
let tenji=+document.getElementById("tenji"+i).value||0;

let score=rate*10+m2+(0.2-st)*40+(7-tenji)*10;
arr.push({boat:i,score,st,m2});
}

arr.sort((a,b)=>b.score-a.score);

let mark="";
let attacker=arr.find(x=>x.st<=0.13);

if(attacker){
mark=`${attacker.boat}が仕掛け、${arr[0].boat}が展開を突く`;
}else{
mark="イン主体";
}

document.getElementById("result").innerHTML=`
<h3>本命 ${arr[0].boat}</h3>
<div class="badge good">${mark}</div>
`;

}

makeInputs();
</script>

</body>
</html>
