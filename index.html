<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BOAT RACE AI PRO MAX LITE CORE</title>

<style>
body{margin:0;background:#0b1220;color:#fff;font-family:sans-serif}
.app{max-width:430px;margin:auto;padding:10px}
.card{background:#111827;padding:14px;margin:10px 0;border-radius:16px}
input,select,button{width:100%;padding:10px;margin-top:6px;border-radius:10px;border:none}
button{background:linear-gradient(135deg,#2563eb,#06b6d4);color:#fff;font-weight:800}
.grid{display:grid;grid-template-columns:40px repeat(5,1fr);gap:6px;margin-top:6px}
.cap{display:flex;align-items:center;justify-content:center;border-radius:8px;font-weight:900}
.c1{background:#fff;color:#000}.c2{background:#000}.c3{background:red}.c4{background:blue}
.c5{background:orange;color:#000}.c6{background:green}
.badge{display:inline-block;padding:6px 10px;border-radius:999px;margin:4px}
.good{background:#16a34a}.warn{background:#dc2626}.tip{background:#2563eb}
</style>
</head>

<body>
<div class="app">

<div class="card">
<h2>BOAT RACE AI PRO MAX（簡略版）</h2>
<select id="track">
<option>住之江</option><option>大村</option><option>戸田</option>
<option>江戸川</option><option>桐生</option>
</select>
</div>

<div class="card">
<div class="grid">
<div>艇</div><div>全国</div><div>M2</div><div>ST</div><div>展示</div><div>級</div>
</div>
<div id="inputs"></div>
</div>

<div class="card">
<button onclick="runAI()">AI予想</button>
</div>

<div class="card">
<div id="result">結果待ち</div>
</div>

</div>

<script>

function makeInputs(){
let html="";
for(let i=1;i<=6;i++){
html+=`
<div class="grid">
<div class="cap c${i}">${i}</div>
<input id="rate${i}" inputmode="decimal">
<input id="m2${i}" inputmode="decimal">
<input id="st${i}" inputmode="decimal">
<input id="tenji${i}" inputmode="decimal">
<select id="cls${i}">
<option>A1</option>
<option>A2</option>
<option>B1</option>
<option>B2</option>
</select>
</div>
`;
}
document.getElementById("inputs").innerHTML=html;
}

function classBonus(c){
return c==="A1"?12:c==="A2"?8:c==="B1"?4:0;
}

function trackBias(track,boat){
if(track==="大村" && boat===1) return 15;
if(track==="戸田") return -5;
if(track==="江戸川") return -10;
return 0;
}

function runAI(){

let arr=[];

for(let i=1;i<=6;i++){

const rate=+document.getElementById("rate"+i).value||0;
const m2=+document.getElementById("m2"+i).value||0;
const st=+document.getElementById("st"+i).value||0;
const tenji=+document.getElementById("tenji"+i).value||0;
const cls=document.getElementById("cls"+i).value;

let score =
rate*10 +
m2*0.8 +
(0.20-st)*40 +
(7-tenji)*10 +
classBonus(cls) +
trackBias(document.getElementById("track").value,i);

arr.push({boat:i,score,st,tenji});
}

arr.sort((a,b)=>b.score-a.score);

// 展開判定
let scenario="イン逃げ";
if(arr[0].boat!==1) scenario="波乱";
if(arr.filter(x=>x.st<=0.13).length>=2) scenario="まくり";

// 万舟判定
let diff=arr[0].score-arr[2].score;
let manshu=0;

if(diff<30) manshu+=40;
if(arr[0].boat!==1) manshu+=20;
if(arr.filter(x=>x.st<=0.13).length>=2) manshu+=20;

manshu=Math.min(100,manshu);

// 買い目
let bets=[
`${arr[0].boat}-${arr[1].boat}-${arr[2].boat}`,
`${arr[0].boat}-${arr[2].boat}-${arr[1].boat}`
];

if(manshu>=60){
bets.push(`${arr[2].boat}-${arr[0].boat}-${arr[1].boat}`);
}

document.getElementById("result").innerHTML=`
<h3>本命：${arr[0].boat}号艇</h3>
<div class="badge good">展開：${scenario}</div>
<div class="badge warn">万舟率：${manshu}%</div>
<div style="margin-top:10px">
${bets.map(b=>`<div class="badge tip">${b}</div>`).join("")}
</div>
`;

}

makeInputs();

</script>

</body>
</html>
