<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BOAT RACE AI LITE</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f172a;color:#fff;margin:0;padding:15px}
h1{margin:0 0 10px}
.card{background:#1e293b;padding:12px;border-radius:12px;margin-bottom:10px}
.grid{display:grid;grid-template-columns:40px repeat(4,1fr);gap:6px;align-items:center}
input{padding:8px;border-radius:8px;border:none;background:#020617;color:#fff}
button{padding:10px;border:none;border-radius:10px;background:#2563eb;color:#fff;font-weight:bold;width:100%}
.result{font-size:20px;font-weight:bold;margin-top:10px}
.link{display:inline-block;margin-top:10px;color:#93c5fd;text-decoration:none}
</style>
</head>
<body>
<h1>BOAT RACE AI LITE</h1>
<div class="card">
<div class="grid"><div>艇</div><div>展示</div><div>ST</div><div>M2</div><div>全国</div></div>
<div id="inputs"></div>
</div>
<div class="card">
<button onclick="runAI()">AI予想</button>
<div class="result" id="result">-</div>
<a class="link" href="index.html">← トップへ戻る</a>
</div>
<script>
function make(){
  let html="";
  for(let i=1;i<=6;i++){
    html+=`<div class="grid" style="margin-top:6px"><div>${i}</div><input id="tenji${i}" inputmode="decimal" pattern="[0-9.]*"><input id="st${i}" inputmode="decimal" pattern="[0-9.]*"><input id="m2${i}" inputmode="decimal" pattern="[0-9.]*"><input id="rate${i}" inputmode="decimal" pattern="[0-9.]*"></div>`;
  }
  document.getElementById("inputs").innerHTML=html;
}
function runAI(){
  let arr=[];
  for(let i=1;i<=6;i++){
    let tenji=+document.getElementById("tenji"+i).value||0;
    let st=+document.getElementById("st"+i).value||0;
    let m2=+document.getElementById("m2"+i).value||0;
    let rate=+document.getElementById("rate"+i).value||0;
    let score=(7-tenji)*10+(0.2-st)*20+m2*0.5+rate*5;
    arr.push({boat:i,score});
  }
  arr.sort((a,b)=>b.score-a.score);
  document.getElementById("result").innerText="本命: "+arr[0].boat+"号艇";
}
make();
</script>
</body>
</html>
