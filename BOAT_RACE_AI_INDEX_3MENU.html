
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>BOAT RACE AI MENU</title>
<meta name="theme-color" content="#0b1220">
<style>
:root{
  --bg:#08101c; --line:#243a63; --text:#edf4ff; --muted:#9fb3d9;
  --blue:#2563eb; --cyan:#06b6d4; --green:#16a34a; --gold:#f59e0b; --violet:#7c3aed;
}
*{box-sizing:border-box}
body{
  margin:0; color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:
    radial-gradient(circle at top left,#16335f 0%,#08101c 42%),
    linear-gradient(180deg,#08101c,#091221);
}
.app{max-width:430px;margin:0 auto;min-height:100vh;padding:0 0 30px}
.header{
  padding:20px 14px 24px;
  background:linear-gradient(135deg,#0f172a,#1d4ed8 58%,#06b6d4);
  border-bottom-left-radius:24px;border-bottom-right-radius:24px;
  box-shadow:0 12px 26px rgba(0,0,0,.35);
}
.header h1{margin:0;font-size:24px}
.header p{margin:6px 0 0;font-size:12px;opacity:.95}
.card{
  margin:12px;padding:16px;
  border-radius:20px;
  background:linear-gradient(180deg,rgba(18,29,52,.98),rgba(11,20,36,.98));
  border:1px solid var(--line);
  box-shadow:0 10px 24px rgba(0,0,0,.26);
}
.hero{
  border-radius:22px;padding:20px;text-align:center;
  background:linear-gradient(135deg,#0b1220,#1e3a8a 58%,#0891b2);
  border:1px solid #345bab;
}
.hero .big{font-size:30px;font-weight:900;line-height:1.25}
.hero .sub{font-size:13px;opacity:.95;margin-top:8px}
.badge{
  display:inline-block;padding:7px 11px;border-radius:999px;margin:4px;font-weight:800
}
.good{background:linear-gradient(135deg,#059669,#16a34a)}
.gold{background:linear-gradient(135deg,#f59e0b,#facc15);color:#111827}
.tip{background:linear-gradient(135deg,#2563eb,#7c3aed)}
.btn{
  display:block;width:100%;text-decoration:none;color:white;font-weight:900;
  text-align:center;padding:17px 14px;border-radius:18px;margin-top:10px
}
.btn-lite{background:linear-gradient(135deg,#2563eb,#06b6d4)}
.btn-pro{background:linear-gradient(135deg,#7c3aed,#2563eb)}
.btn-scout{background:linear-gradient(135deg,#f59e0b,#f97316)}
.small{font-size:12px;color:var(--muted);line-height:1.7}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>BOAT RACE AI</h1>
    <p>LITE / PRO / SCOUT を使い分けるトップページ</p>
  </div>

  <div class="card">
    <div class="hero">
      <div class="big">普段は LITE<br>勝負は PRO<br>全体戦略は SCOUT</div>
      <div class="sub">3つの役割を分けて、速さ・精度・資金配分を両立</div>
    </div>
  </div>

  <div class="card">
    <span class="badge good">普段用</span>
    <a class="btn btn-lite" href="lite.html">BOAT RACE AI LITE を開く</a>
    <div class="small">全国 / 展示 / ST の少入力で高速判定。まず全レースを流す用です。</div>
  </div>

  <div class="card">
    <span class="badge tip">勝負用</span>
    <a class="btn btn-pro" href="pro.html">BOAT RACE AI PRO を開く</a>
    <div class="small">進入予測AI、1マーク展開AI、展示差AI、万舟警戒モードつき。勝負レースの最終判断に使います。</div>
  </div>

  <div class="card">
    <span class="badge gold">戦略用</span>
    <a class="btn btn-scout" href="scout.html">SCOUT を開く</a>
    <div class="small">複数レースを比較して、勝負レース自動抽出と資金配分を行います。買うレースだけ絞る時に使います。</div>
  </div>
</div>
</body>
</html>
